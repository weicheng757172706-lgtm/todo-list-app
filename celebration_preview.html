<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完成任务庆祝窗 · 美化预览</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #f4f6f8;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 24px;
  }
  h1 { font-size: 18px; color: #2C3E50; margin-bottom: 4px; }
  .hint { font-size: 13px; color: #7f8c8d; margin-bottom: 16px; }

  /* 仿真 app 窗口 */
  .app {
    position: relative;
    width: 720px; height: 480px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,.18);
    overflow: hidden;
  }
  .app-title {
    height: 46px; background: var(--title);
    display: flex; align-items: center; padding: 0 16px;
    color: #fff; font-size: 15px; font-weight: bold; letter-spacing: .5px;
  }
  .app-body {
    padding: 28px; color: #95a5a6; font-size: 14px; line-height: 1.9;
  }
  .app-body .row { display:flex; gap:10px; align-items:center; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #ecf0f1; border:2px solid #d5dbdb; }

  /* 庆祝覆盖层 */
  .overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #confetti { position: absolute; inset: 0; width: 100%; height: 100%; }
  .card {
    position: relative; z-index: 2;
    background: rgba(255,255,255,.96);
    border-radius: 18px;
    padding: 36px 58px 34px;
    text-align: center;
    box-shadow: 0 18px 50px rgba(0,0,0,.22);
    border: 1px solid rgba(255,255,255,.6);
    transform: scale(.6); opacity: 0;
    --accent: #F1C40F;
  }
  .card.play { animation: pop .55s cubic-bezier(.18,.9,.32,1.4) forwards; }
  .card.out  { animation: fade .5s ease forwards; }
  @keyframes pop { to { transform: scale(1); opacity: 1; } }
  @keyframes fade { to { transform: scale(1.05); opacity: 0; } }

  .emoji { font-size: 74px; line-height: 1; animation: bob 1.1s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-8px);} }
  .title { font-size: 26px; font-weight: 800; color: var(--title); margin-top: 12px; }
  .sub { font-size: 15px; color: #8a97a0; margin-top: 12px; }
  .chip {
    display: inline-block; margin-top: 14px; padding: 5px 14px;
    background: var(--chip-bg); color: var(--chip-fg); font-size: 15px; font-weight: 700;
    border-radius: 999px;
  }
  .ring {
    position:absolute; left:50%; top:50%; width: 92px; height: 92px;
    margin:-40px 0 0 -40px; border-radius:50%;
    border: 3px solid var(--accent); opacity:0;
  }
  .ring.play { animation: ring .6s ease-out forwards; }
  @keyframes ring { 0%{transform:scale(.4);opacity:.9;} 100%{transform:scale(1.5);opacity:0;} }

  /* 控制条 */
  .controls { margin-top: 18px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .controls button, .controls select {
    font-family: inherit; font-size: 13px; padding: 8px 16px;
    border-radius: 8px; border: 1px solid #d5dbdb; background:#fff; color:#2C3E50; cursor:pointer;
  }
  .controls button.primary { background: #4F81BD; color:#fff; border-color:#4F81BD; }
  .controls button:hover { filter: brightness(1.05); }

  /* 主题变量 */
  .app.theme-shuangjian { --title:#2C3E50; --accent:#F1C40F; --chip-bg:#F1C40F; --chip-fg:#2C3E50; }
  .app.theme-qingdan    { --title:#2C3E50; --accent:#4F81BD; --chip-bg:#F1C40F; --chip-fg:#2C3E50; }
</style>
</head>
<body>
  <h1>完成任务庆祝窗 · 美化预览</h1>
  <div class="hint">原版：纯 Canvas 黑字烟花（约 1.5s）。下方为美化方案「庆祝卡片 + 主题色礼花」。可切换主题 / 点重播看动效。</div>

  <div class="app theme-shuangjian" id="app">
    <div class="app-title">⚔️ TodoList · 冒险者的游戏</div>
    <div class="app-body">
      <div class="row"><span class="dot"></span> 进行中任务 ……</div>
      <div class="row"><span class="dot"></span> 已通关任务 ……</div>
      <div class="row"><span class="dot"></span> 本周黄金之路 ……</div>
    </div>
    <div class="overlay">
      <canvas id="confetti"></canvas>
      <div class="card" id="card">
        <div class="ring" id="ring"></div>
        <div class="emoji" id="emoji">🎉</div>
        <div class="title" id="title">恭喜您，冒险已完成！</div>
        <div class="sub" id="sub">本次冒险已记入战绩</div>
        <div class="chip" id="chip">+10 经验值</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <select id="theme">
      <option value="shuangjian">双剑套（金 #F1C40F 点缀）</option>
      <option value="qingdan">清单套（蓝 #4F81BD 点缀）</option>
    </select>
    <select id="wording">
      <option value="auto">文案：随主题（双剑=冒险 / 清单=任务）</option>
      <option value="adventure">固定：恭喜您，冒险已完成！</option>
      <option value="task">固定：恭喜您，任务已完成！</option>
    </select>
    <button class="primary" id="replay">▶ 重播动画</button>
  </div>

<script>
  const app = document.getElementById('app');
  const card = document.getElementById('card');
  const ring = document.getElementById('ring');
  const emoji = document.getElementById('emoji');
  const title = document.getElementById('title');
  const sub = document.getElementById('sub');
  const chip = document.getElementById('chip');
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');

  const themeSel = document.getElementById('theme');
  const wordingSel = document.getElementById('wording');

  let particles = [];
  let rafId = null;
  let outTimer = null, ringTimer = null;

  function sizeCanvas(){
    canvas.width = app.clientWidth;
    canvas.height = app.clientHeight;
  }

  function confettiColors(){
    const t = themeSel.value;
    return t === 'qingdan'
      ? ['#4F81BD','#2C3E50','#5B8FF9','#1B4F72','#A9C7E8']
      : ['#F1C40F','#2C3E50','#4F81BD','#E67E22','#2ECC71'];
  }

  function applyWording(){
    const w = wordingSel.value;
    const isQingdan = themeSel.value === 'qingdan';
    let useTask = (w === 'task') || (w === 'auto' && isQingdan);
    title.textContent = useTask ? '恭喜您，任务已完成！' : '恭喜您，冒险已完成！';
    sub.textContent   = useTask ? '本次任务已记入战绩' : '本次冒险已记入战绩';
    emoji.textContent = useTask ? '🏆' : '🎉';
  }

  function launch(){
    sizeCanvas();
    applyWording();

    // 重置卡片
    card.classList.remove('out'); ring.classList.remove('play');
    void card.offsetWidth; // reflow
    card.classList.add('play'); ring.classList.add('play');

    // 生成礼花粒子（从中心爆发）
    particles = [];
    const cx = canvas.width/2, cy = canvas.height/2;
    const colors = confettiColors();
    for(let i=0;i<70;i++){
      const a = Math.random()*Math.PI*2;
      const sp = 3 + Math.random()*7;
      particles.push({
        x:cx, y:cy,
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - 2,
        g:0.12, life:1, size:4+Math.random()*5,
        color:colors[i%colors.length], rot:Math.random()*6
      });
    }

    cancelAnimationFrame(rafId);
    animate();

    // 约 2.2s 后淡出
    clearTimeout(outTimer);
    outTimer = setTimeout(()=>{
      card.classList.remove('play'); card.classList.add('out');
    }, 2200);
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    for(const p of particles){
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.life -= 0.012;
      if(p.life > 0){
        alive = true;
        ctx.globalAlpha = Math.max(0,p.life);
        ctx.fillStyle = p.color;
        ctx.save();
        ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
        ctx.restore();
      }
    }
    ctx.globalAlpha = 1;
    if(alive) rafId = requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }

  themeSel.addEventListener('change', ()=>{
    app.className = 'app theme-' + themeSel.value;
    launch();
  });
  wordingSel.addEventListener('change', launch);
  document.getElementById('replay').addEventListener('click', launch);

  // 首次自动播放
  window.addEventListener('load', ()=> setTimeout(launch, 300));
</script>
</body>
</html>
